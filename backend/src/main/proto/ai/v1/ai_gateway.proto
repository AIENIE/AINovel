syntax = "proto3";

package fireflychat.ai.v1;

option java_multiple_files = true;
option java_package = "fireflychat.ai.v1";
option java_outer_classname = "AiServiceProto";

enum ModelType {
  MODEL_TYPE_UNSPECIFIED = 0;
  MODEL_TYPE_TEXT = 1;
  MODEL_TYPE_IMAGE = 2;
  MODEL_TYPE_EMBEDDING = 3;
  MODEL_TYPE_AUDIO = 4;
  MODEL_TYPE_OCR = 5;
}

enum ThinkingEffort {
  THINKING_EFFORT_UNSPECIFIED = 0;
  THINKING_EFFORT_MINIMAL = 1;
  THINKING_EFFORT_LOW = 2;
  THINKING_EFFORT_MEDIUM = 3;
  THINKING_EFFORT_HIGH = 4;
  THINKING_EFFORT_XHIGH = 5;
  THINKING_EFFORT_MAX = 6;
}

message ModelOption {
  int64 id = 1;
  string display_name = 2;
  string provider = 3;
  double input_rate = 4;
  double output_rate = 5;
  ModelType type = 6;
  bool supports_image_input = 7;
  bool supports_streaming = 8;
}

message ListModelsRequest {
  int64 user_id = 1;
}

message ListModelsResponse {
  repeated ModelOption models = 1;
}

message ChatMessage {
  string role = 1;
  string content = 2;
}

message ChatCompletionsRequest {
  string request_id = 1;
  string project_key = 2;
  int64 user_id = 3;
  string session_id = 4;
  string model = 5;
  repeated ChatMessage messages = 6;
  string img = 7;
  optional bool thinking_enabled = 8;
  ThinkingEffort thinking_effort = 9;
}

message ChatCompletionsResponse {
  string content = 1;
  string model_key = 2;
  int64 prompt_tokens = 3;
  int64 completion_tokens = 4;
  int64 cache_tokens = 5;
}

enum ChatStreamEventType {
  CHAT_STREAM_EVENT_TYPE_UNSPECIFIED = 0;
  CHAT_STREAM_EVENT_TYPE_STARTED = 1;
  CHAT_STREAM_EVENT_TYPE_CONTENT_DELTA = 2;
  CHAT_STREAM_EVENT_TYPE_COMPLETED = 3;
}

message ChatCompletionsStreamEvent {
  string request_id = 1;
  int64 sequence = 2;
  ChatStreamEventType event_type = 3;
  string model_key = 4;
  string content_delta = 5;
  int64 output_tokens_so_far = 6;
  bool output_tokens_estimated = 7;
  int64 prompt_tokens = 8;
  int64 completion_tokens = 9;
  int64 cache_tokens = 10;
  string finish_reason = 11;
}

message EmbeddingsRequest {
  string request_id = 1;
  string project_key = 2;
  int64 user_id = 3;
  string session_id = 4;
  string model = 5;
  repeated string input = 6;
  optional bool normalize = 7;
}

message Embedding {
  repeated float vector = 1;
}

message EmbeddingsResponse {
  string model_key = 1;
  int32 dimensions = 2;
  repeated Embedding embeddings = 3;
  int64 prompt_tokens = 4;
}

service AiGatewayService {
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc ChatCompletions(ChatCompletionsRequest) returns (ChatCompletionsResponse);
  rpc ChatCompletionsStream(ChatCompletionsRequest) returns (stream ChatCompletionsStreamEvent);
  rpc Embeddings(EmbeddingsRequest) returns (EmbeddingsResponse);
}
