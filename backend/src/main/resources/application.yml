spring:
  mvc:
    servlet:
      path: /api
  datasource:
    url: ${DB_URL:jdbc:mysql://${MYSQL_HOST:base.seekerhut.com}:${MYSQL_PORT:23306}/${MYSQL_DB:ainovel}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:${MYSQL_USER:ainovel}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:ainovelpwd}}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-version: 1
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true
  data:
    redis:
      host: ${REDIS_HOST:base.seekerhut.com}
      port: ${REDIS_PORT:26379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      key-prefix: ${REDIS_KEY_PREFIX:aienie:ainovel:}
      use-key-prefix: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    time-zone: ${APP_TIME_ZONE:Asia/Shanghai}

server:
  port: ${PORT:${BACKEND_PORT:11041}}

logging:
  file:
    name: ${LOGGING_FILE_NAME:${APP_LOG_DIR:./logs}/ainovel.log}
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.ainovel: ${LOGGING_LEVEL_APP:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  time-zone: ${APP_TIME_ZONE:Asia/Shanghai}
  records:
    dir: ${APP_RECORD_DIR:/app/records}
    elasticsearch-query-enabled: ${APP_RECORD_ES_QUERY_ENABLED:true}
  admin-auth:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:}
  jwt:
    secret: ${JWT_SECRET:super-secret-change-me-1234567890abcdef-super-secret-change-me-1234567890}
    expiration-minutes: 120
  ai:
    model: ${AI_MODEL:deepseek-v4-flash}
    base-url: ${AI_BASE_URL:}
    api-key: ${AI_API_KEY:}
  external:
    project-key: ${EXTERNAL_PROJECT_KEY:ainovel}
    timeout-ms: ${EXTERNAL_TIMEOUT_MS:120000}
    grpc:
      tls-enabled: ${EXTERNAL_GRPC_TLS_ENABLED:true}
      plaintext-enabled: ${EXTERNAL_GRPC_PLAINTEXT_ENABLED:false}
    security:
      fail-fast: ${EXTERNAL_SECURITY_FAIL_FAST:true}
      ai:
        hmac-caller: ${EXTERNAL_AI_HMAC_CALLER:}
        hmac-secret: ${EXTERNAL_AI_HMAC_SECRET:}
      user:
        internal-grpc-token: ${EXTERNAL_USER_INTERNAL_GRPC_TOKEN:}
      pay:
        service-jwt: ${EXTERNAL_PAY_SERVICE_JWT:}
        jwt-issuer: ${EXTERNAL_PAY_JWT_ISSUER:aienie-services}
        jwt-audience: ${EXTERNAL_PAY_JWT_AUDIENCE:aienie-payservice-grpc}
        required-role: ${EXTERNAL_PAY_JWT_ROLE:SERVICE}
        required-scopes: ${EXTERNAL_PAY_JWT_SCOPES:billing.balance.read,billing.balance.convert,billing.grant.write,billing.usage.deduct,billing.checkin.read,billing.checkin.write,billing.redeem.write,billing.ledger.read}
    userservice-http:
      address: ${USER_HTTP_ADDR:https://userservice.seekerhut.com}
    aiservice-grpc:
      address: ${AI_GRPC_ADDR:static://aiservice.seekerhut.com:443}
    payservice-grpc:
      address: ${PAY_GRPC_ADDR:static://payservice.seekerhut.com:443}

sso:
  callback-origin: ${SSO_CALLBACK_ORIGIN:https://ainovel.localhut.com}
  session-validation:
    enabled: ${SSO_SESSION_VALIDATION_ENABLED:true}
    timeout-ms: ${USER_SESSION_GRPC_TIMEOUT_MS:5000}
    grpc-address: ${USER_GRPC_ADDR:static://userservice.seekerhut.com:443}

qdrant:
  host: ${QDRANT_HOST:http://base.seekerhut.com}
  http-port: ${QDRANT_PORT:26333}
  enabled: ${QDRANT_ENABLED:true}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

elasticsearch:
  hosts: ${ELASTICSEARCH_HOSTS:https://es.localhut.com:9200}
  username: ${ELASTICSEARCH_USERNAME:elastic}
  password: ${ELASTICSEARCH_PASSWORD:}

filebeat:
  index-prefix: ${FILEBEAT_INDEX_PREFIX:aienie-local-ainovel}
