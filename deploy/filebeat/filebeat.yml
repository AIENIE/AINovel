filebeat.inputs:
  - type: filestream
    id: ${SERVICE_NAME:ainovel}-app-logs
    paths:
      - ${APP_LOG_DIR:/app/logs}/*.log
    fields_under_root: true
    fields:
      service.name: ${SERVICE_NAME:ainovel}
      service.environment: ${APP_ENV:local}
      event.dataset: ${SERVICE_NAME:ainovel}.app

  - type: filestream
    id: ${SERVICE_NAME:ainovel}-records
    paths:
      - ${APP_RECORD_DIR:/app/records}/*.ndjson
    parsers:
      - ndjson:
          target: ""
          add_error_key: true
          overwrite_keys: true
    fields_under_root: true
    fields:
      service.name: ${SERVICE_NAME:ainovel}
      service.environment: ${APP_ENV:local}
      event.dataset: ${SERVICE_NAME:ainovel}.records

processors:
  - add_host_metadata: ~

setup.ilm.enabled: false
setup.template.name: "${FILEBEAT_INDEX_PREFIX:aienie-local-ainovel}"
setup.template.pattern: "${FILEBEAT_INDEX_PREFIX:aienie-local-ainovel}-*"
setup.template.settings:
  index.number_of_shards: 1
  index.number_of_replicas: 0

output.elasticsearch:
  hosts: ["${ELASTICSEARCH_HOSTS:http://local-elasticsearch:9200}"]
  index: "${FILEBEAT_INDEX_PREFIX:aienie-local-ainovel}-%{+yyyy.MM.dd}"
