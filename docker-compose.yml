services:
  backend:
    container_name: ainovel-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      DB_URL: jdbc:mysql://${MYSQL_HOST:-base.seekerhut.com}:${MYSQL_PORT:-23306}/${MYSQL_DB:-ainovel}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${MYSQL_USER:-ainovel}
      DB_PASSWORD: ${MYSQL_PASSWORD:-ainovelpwd}
      REDIS_HOST: ${REDIS_HOST:-base.seekerhut.com}
      REDIS_PORT: ${REDIS_PORT:-26379}
      REDIS_PASSWORD: ""
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-aienie:ainovel:}
      QDRANT_HOST: ${QDRANT_HOST:-http://base.seekerhut.com}
      QDRANT_PORT: ${QDRANT_PORT:-26333}
      QDRANT_ENABLED: ${QDRANT_ENABLED:-true}
      PORT: ${BACKEND_PORT:-11041}
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me-1234567890abcdef-super-secret-change-me-1234567890}
      USER_HTTP_ADDR: ${USER_HTTP_ADDR:-https://userservice.localhut.com}
      AI_GRPC_ADDR: ${AI_GRPC_ADDR:-static://aiservice.localhut.com:10011}
      PAY_GRPC_ADDR: ${PAY_GRPC_ADDR:-static://payservice.localhut.com:10021}
      USER_SESSION_GRPC_TIMEOUT_MS: ${USER_SESSION_GRPC_TIMEOUT_MS:-5000}
      USER_GRPC_ADDR: ${USER_GRPC_ADDR:-static://127.0.0.1:10001}
      SSO_SESSION_VALIDATION_ENABLED: ${SSO_SESSION_VALIDATION_ENABLED:-true}
      SSO_CALLBACK_ORIGIN: ${SSO_CALLBACK_ORIGIN:-https://ainovel.localhut.com}
      EXTERNAL_PROJECT_KEY: ${EXTERNAL_PROJECT_KEY:-ainovel}
      EXTERNAL_TIMEOUT_MS: ${EXTERNAL_TIMEOUT_MS:-120000}
      EXTERNAL_GRPC_TLS_ENABLED: ${EXTERNAL_GRPC_TLS_ENABLED:-false}
      EXTERNAL_GRPC_PLAINTEXT_ENABLED: ${EXTERNAL_GRPC_PLAINTEXT_ENABLED:-true}
      EXTERNAL_SECURITY_FAIL_FAST: ${EXTERNAL_SECURITY_FAIL_FAST:-true}
      EXTERNAL_AI_HMAC_CALLER: ${EXTERNAL_AI_HMAC_CALLER:-ainovel}
      EXTERNAL_AI_HMAC_SECRET: ${EXTERNAL_AI_HMAC_SECRET:-sk-HbBQl2TkRWMUYXlJ2YPqQSQBe0JDemshipNRrO88aKU}
      EXTERNAL_USER_INTERNAL_GRPC_TOKEN: ${EXTERNAL_USER_INTERNAL_GRPC_TOKEN:-local-userservice-internal-token}
      EXTERNAL_PAY_SERVICE_JWT: ${EXTERNAL_PAY_SERVICE_JWT:-REPLACE_ME_PAY_SERVICE_JWT}
      EXTERNAL_PAY_JWT_SECRET: ${EXTERNAL_PAY_JWT_SECRET:-}
      EXTERNAL_PAY_JWT_ISSUER: ${EXTERNAL_PAY_JWT_ISSUER:-aienie-services}
      EXTERNAL_PAY_JWT_AUDIENCE: ${EXTERNAL_PAY_JWT_AUDIENCE:-aienie-payservice-grpc}
      EXTERNAL_PAY_JWT_ROLE: ${EXTERNAL_PAY_JWT_ROLE:-SERVICE}
      EXTERNAL_PAY_JWT_SCOPES: ${EXTERNAL_PAY_JWT_SCOPES:-billing.balance.read,billing.balance.convert,billing.grant.write,billing.usage.deduct,billing.checkin.read,billing.checkin.write,billing.redeem.write,billing.ledger.read}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-Asia/Shanghai}
      APP_LOG_DIR: ${APP_LOG_DIR:-/app/logs}
      APP_RECORD_DIR: ${APP_RECORD_DIR:-/app/records}
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME:-/app/logs/ainovel.log}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin-password}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-false}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-false}
      APP_SECURITY_CORS_ALLOWED_ORIGINS: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:-https://ainovel.localhut.com,https://ainovel.aienie.com,http://127.0.0.1:11040,http://localhost:11040}
      APP_SECURITY_CORS_ALLOWED_METHODS: ${APP_SECURITY_CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS,PATCH}
      APP_SECURITY_CORS_ALLOWED_HEADERS: ${APP_SECURITY_CORS_ALLOWED_HEADERS:-Authorization,Content-Type,Idempotency-Key,X-Requested-With}
      JAVA_OPTS: ${JAVA_OPTS:--Duser.timezone=Asia/Shanghai}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "userservice.localhut.com:${USERSERVICE_HOST_IP:-host-gateway}"
      - "payservice.localhut.com:${PAYSERVICE_HOST_IP:-host-gateway}"
      - "aiservice.localhut.com:${AISERVICE_HOST_IP:-host-gateway}"
    volumes:
      - ${APP_LOG_DIR_HOST:-/home/duwei/aienie-runtime/observability/data/ainovel/logs}:/app/logs
      - ${APP_RECORD_DIR_HOST:-/home/duwei/aienie-runtime/observability/data/ainovel/records}:/app/records

  frontend:
    container_name: ainovel-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-11040}:10010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ainovel

networks:
  ainovel:
    driver: bridge
